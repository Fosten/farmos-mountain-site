name: Deploy farmOS Dev CI/CD

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: ./farmOS

env:
  IMAGE_NAME_PREFIX: ghcr.io/fosten/farmos-mountain-site-4.x-dev

# Grant permissions globally so GITHUB_TOKEN can push and read packages natively
permissions:
  contents: read
  packages: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      version_tag: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v7

      # Explicitly compute the short SHA to use as a reliable variable across all jobs
      - name: Compute short SHA
        id: vars
        run: echo "short_sha=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME_PREFIX }}
          labels: |
            org.label-schema.docker.cmd=docker run -d -p 80:80 ${{ env.IMAGE_NAME_PREFIX }}:latest
          flavor:
            latest=false
          tags: |
            type=raw,value=${{ steps.vars.outputs.short_sha }}

  build:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and load the image into the local runner's daemon using the explicit tag string
      - name: Build and load image locally for testing
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          load: true
          context: farmOS/
          file: farmOS/Dockerfile.dev
          tags: ${{ env.IMAGE_NAME_PREFIX }}:${{ needs.meta.outputs.version_tag }}
          labels: ${{ needs.meta.outputs.labels }}
          provenance: false
          secrets: |
            "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"

      - name: Start container
        run: docker run -d --name www ${{ env.IMAGE_NAME_PREFIX }}:${{ needs.meta.outputs.version_tag }}

      - name: Run PHP CodeSniffer
        id: codesniffer
        run: docker exec -u www-data www phpcs /opt/drupal/web/modules/custom

      - name: Check PHP compatibility of contrib modules and themes (ignore warnings).
        id: phpcompatibility
        run: |
          docker exec -u www-data www phpcs --standard=PHPCompatibility --runtime-set testVersion 8.2- --warning-severity=0 /opt/drupal/web/modules
          docker exec -u www-data www phpcs --standard=PHPCompatibility --runtime-set testVersion 8.2- --warning-severity=0 /opt/drupal/web/themes

      - name: Run PHPStan
        id: phpstan
        run: docker exec -u www-data www phpstan analyze -l 5 --memory-limit 1G /opt/drupal/web/profiles/farm

#      - name: Run PHPUnit
#        id: phpunit
#        run: docker exec -u www-data www phpunit --verbose /opt/drupal/web/profiles/farm

      - name: Report
        if: ${{ success() || failure() }}
        run: |
          echo '# Code Analysis' >> $GITHUB_STEP_SUMMARY
          echo '| Test | Status |' >> $GITHUB_STEP_SUMMARY
          echo '| --- | --- |' >> $GITHUB_STEP_SUMMARY
          echo '| CodeSniffer | ${{ steps.codesniffer.conclusion == 'failure' && '❌' || ' ✅' }} |' >> $GITHUB_STEP_SUMMARY
          echo '| PHP compatibility | ${{ steps.phpcompatibility.conclusion == 'failure' && '❌' || ' ✅' }} |' >> $GITHUB_STEP_SUMMARY
          echo '| PHPStan | ${{ steps.phpstan.conclusion == 'failure' && '❌' || ' ✅' }} |' >> $GITHUB_STEP_SUMMARY

      # Pushes your local, tested tag straight up to GHCR
      - name: Push image to GHCR
        run: |
          docker push ${{ env.IMAGE_NAME_PREFIX }}:${{ needs.meta.outputs.version_tag }}

  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Deploy to cluster
        uses: kitconcept/docker-stack-deploy@v1.4.0
        with:
          registry: "ghcr.io"
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_port: ${{ secrets.DEPLOY_PORT }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_private_key: ${{ secrets.DEPLOY_SSH }}
          stack_file: devops/stacks/farmdev.lillymountain.com.yml
          stack_name: farmdev-lillymountain-com
          stack_param: ${{ needs.meta.outputs.version_tag }}
          env_file: ${{ secrets.ENV_FILE }}
          deploy_timeout: 480
          args: --with-registry-auth
          resolve_image: never
