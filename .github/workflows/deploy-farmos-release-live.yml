name: Deploy farmOS Release Live CI/CD

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: ./farmOS

env:
  IMAGE_NAME_PREFIX: ghcr.io/fosten/farmos-mountain-site-4.0.3

permissions:
  contents: read
  packages: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      version_tag: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v7

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME_PREFIX }}
          labels: |
            org.label-schema.docker.cmd=docker run -d -p 80:80 ${{ env.IMAGE_NAME_PREFIX }}:latest
          flavor:
            latest=false
          tags: |
            type=raw,value=${{ steps.vars.outputs.short_sha }}

  build:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          context: farmOS/
          file: farmOS/Dockerfile.release
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ needs.meta.outputs.tags }}
          labels: ${{ needs.meta.outputs.labels }}
          provenance: false
          secrets: |
            "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"

  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Deploy to cluster
        uses: kitconcept/docker-stack-deploy@v1.4.0
        with:
          registry: "ghcr.io"
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_port: ${{ secrets.DEPLOY_PORT }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_private_key: ${{ secrets.DEPLOY_SSH }}
          stack_file: devops/stacks/farmos.lillymountain.com.yml
          stack_name: farmos-lillymountain-com
          stack_param: ${{ needs.meta.outputs.version_tag }}
          env_file: ${{ secrets.ENV_FILE }}
          deploy_timeout: 480
          args: --with-registry-auth
          resolve_image: never
